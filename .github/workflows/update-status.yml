name: Generate Status JSON

on:
  push:
    branches: [main]

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: Generate status.json
        run: |
          python dashboard/generate_status.py
          cp dashboard/status.json docs/status.json

      - name: Commit status.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/status.json docs/status.json
          git diff --staged --quiet || git commit -m "ci: update status.json [skip ci]"
          git push
