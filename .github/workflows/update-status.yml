          import os, json, re, glob, yaml

          def parse_frontmatter(filepath):
              """Parse YAML frontmatter from a markdown file."""
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  if not content.startswith('---'):
                      return {}, content
                  parts = content.split('---', 2)
                  if len(parts) < 3:
                      return {}, content
                  try:
                      fm = yaml.safe_load(parts[1]) or {}
                  except:
                      fm = {}
                  return fm, parts[2].strip()
              except:
                  return {}, ""

          def parse_table(content, expected_headers=None):
              """Parse markdown tables into list of dicts."""
              rows = []
              lines = content.split('\n')
              headers = None
              for line in lines:
                  line = line.strip()
                  if not line.startswith('|'):
                      if headers:
                          break  # table ended
                      continue
                  cells = [c.strip() for c in line.split('|')[1:-1]]
                  if not cells:
                      continue
                  if all(re.match(r'^-+$', c) for c in cells):
                      continue  # separator
                  if headers is None:
                      headers = cells
                      if expected_headers and not any(h in headers for h in expected_headers):
                          headers = None
                          continue
                  else:
                      row = {}
                      for i, h in enumerate(headers):
                          row[h] = cells[i] if i < len(cells) else ""
                      rows.append(row)
              return rows

          def extract_agenda(body):
              """Extract agenda items from sitting body."""
              items = []
              in_agenda = False
              for line in body.split('\n'):
                  if '## Agenda' in line:
                      in_agenda = True
                      continue
                  if in_agenda:
                      if line.startswith('##'):
                          break
                      m = re.match(r'\d+\.\s*(report|discussion-?\d*|deliberation):\s*`?([^`]+)`?', line.strip())
                      if m:
                          items.append({"mode": m.group(1), "item": m.group(2).strip()})
                      elif re.match(r'\d+\.\s*confirm', line.strip()):
                          items.append({"mode": "procedural", "item": line.strip().split('.', 1)[1].strip()})
              return items

          def extract_section(body, section_name):
              """Extract text under a ## section."""
              lines = []
              capture = False
              for line in body.split('\n'):
                  if f'## {section_name}' in line:
                      capture = True
                      continue
                  if capture:
                      if line.startswith('## '):
                          break
                      if line.strip():
                          lines.append(line.strip().lstrip('- '))
              return lines

          # ========================================
          # 1. Parse Sittings
          # ========================================
          sittings = []
          sitting_files = sorted(glob.glob('proposals/operations/company-os-*-ordinary-sitting.md'))
          
          # Build a number mapping for sorting
          num_words = {
              'first':1,'second':2,'third':3,'fourth':4,'fifth':5,'sixth':6,'seventh':7,
              'eighth':8,'ninth':9,'tenth':10,'eleventh':11,'twelfth':12,'thirteenth':13,
              'fourteenth':14,'fifteenth':15,'sixteenth':16,'seventeenth':17,'eighteenth':18,
              'nineteenth':19,'twentieth':20,'twenty-first':21,'twenty-second':22,'twenty-third':23,
              'twenty-fourth':24,'twenty-fifth':25,'twenty-sixth':26,'twenty-seventh':27,
              'twenty-eighth':28,'twenty-ninth':29,'thirtieth':30,'thirty-first':31,
              'thirty-second':32,'thirty-third':33,'thirty-fourth':34,'thirty-fifth':35,
              'thirty-sixth':36,'thirty-seventh':37,'thirty-eighth':38,'thirty-ninth':39,
              'fortieth':40,'forty-first':41,'forty-second':42,'forty-third':43,'forty-fourth':44,
              'forty-fifth':45,'forty-sixth':46,'forty-seventh':47,'forty-eighth':48,'forty-ninth':49,
              'fiftieth':50,'fifty-first':51,'fifty-second':52,'fifty-third':53,'fifty-fourth':54,
              'fifty-fifth':55,'fifty-sixth':56,'fifty-seventh':57,'fifty-eighth':58,'fifty-ninth':59,
              'sixtieth':60,'sixty-first':61,'sixty-second':62,'sixty-third':63,'sixty-fourth':64,
              'sixty-fifth':65,'sixty-sixth':66,'sixty-seventh':67,'sixty-eighth':68,'sixty-ninth':69,
              'seventieth':70,'seventy-first':71,'seventy-second':72,'seventy-third':73,
              'seventy-fourth':74,'seventy-fifth':75,'seventy-sixth':76,'seventy-seventh':77,
              'seventy-eighth':78,'seventy-ninth':79,'eightieth':80,'eighty-first':81,
              'eighty-second':82,'eighty-third':83,'eighty-fourth':84,'eighty-fifth':85,
              'eighty-sixth':86,'eighty-seventh':87,'eighty-eighth':88,'eighty-ninth':89,
              'ninetieth':90,'ninety-first':91,'ninety-second':92,'ninety-third':93,
              'ninety-fourth':94,'ninety-fifth':95,'ninety-sixth':96,'ninety-seventh':97,
              'ninety-eighth':98,'ninety-ninth':99,'hundredth':100
          }

          def get_sitting_number(filename):
              base = os.path.basename(filename).replace('company-os-','').replace('-ordinary-sitting.md','')
              return num_words.get(base, 0)

          for f in sitting_files:
              fm, body = parse_frontmatter(f)
              num = get_sitting_number(f)
              agenda = extract_agenda(body)
              goal = extract_section(body, 'Goal')
              result = extract_section(body, 'Result')
              sittings.append({
                  "number": num,
                  "id": fm.get('id', ''),
                  "status": fm.get('status', ''),
                  "date": fm.get('created_at', ''),
                  "goal": goal[0] if goal else "",
                  "agenda": agenda,
                  "result": result
              })

          sittings.sort(key=lambda s: s['number'], reverse=True)

          # ========================================
          # 2. Parse Rulings
          # ========================================
          rulings = {}
          for f in glob.glob('decisions/operations/*-ordinary-sitting-ruling.md'):
              fm, body = parse_frontmatter(f)
              base = os.path.basename(f).replace('-ordinary-sitting-ruling.md','')
              num = num_words.get(base, 0)
              rulings[num] = {
                  "ruling": fm.get('ruling', ''),
                  "reason": fm.get('reason', ''),
                  "executor": fm.get('executor', ''),
                  "minority_view": fm.get('minority_view', ''),
                  "founder_veto": fm.get('founder_veto_used', False)
              }

          # ========================================
          # 3. Parse Improvement Board
          # ========================================
          improvement_items = []
          if os.path.exists('ledgers/company-os-improvement-board.md'):
              _, body = parse_frontmatter('ledgers/company-os-improvement-board.md')
              improvement_items = parse_table(body, ['Item', 'Status'])

          # ========================================
          # 4. Parse Departments
          # ========================================
          departments = []
          if os.path.exists('departments/registry.md'):
              _, body = parse_frontmatter('departments/registry.md')
              departments = parse_table(body, ['Department', 'Steward'])

          # ========================================
          # 5. Parse Officeholders
          # ========================================
          officeholders = []
          if os.path.exists('ledgers/officeholder-registry.md'):
              _, body = parse_frontmatter('ledgers/officeholder-registry.md')
              officeholders = parse_table(body, ['Office', 'Holder'])

          # ========================================
          # 6. Parse Units
          # ========================================
          units = []
          if os.path.exists('units/registry.md'):
              _, body = parse_frontmatter('units/registry.md')
              units = parse_table(body, ['Unit', 'Seat state'])

          # ========================================
          # 7. Parse Activities
          # ========================================
          activities = []
          if os.path.exists('ledgers/current-activity-board.md'):
              _, body = parse_frontmatter('ledgers/current-activity-board.md')
              activities = parse_table(body, ['Actor', 'Current Work'])

          # ========================================
          # 8. Parse Work Allocation
          # ========================================
          work_allocation = []
          if os.path.exists('ledgers/department-work-allocation-board.md'):
              _, body = parse_frontmatter('ledgers/department-work-allocation-board.md')
              work_allocation = parse_table(body, ['Department', 'Current assignment'])

          # ========================================
          # 9. Recent Commits
          # ========================================
          import subprocess
          try:
              log = subprocess.check_output(
                  ['git', 'log', '-20', '--pretty=format:%h|%an|%ci|%s'],
                  text=True
              ).strip().split('\n')
              commits = []
              for line in log:
                  parts = line.split('|', 3)
                  if len(parts) == 4:
                      commits.append({"hash": parts[0], "author": parts[1], "date": parts[2], "message": parts[3]})
          except:
              commits = []

          # ========================================
          # Build final JSON
          # ========================================
          result = {
              "sittings": sittings,
              "rulings": {str(k): v for k, v in rulings.items()},
              "improvement_board": improvement_items,
              "departments": departments,
              "officeholders": officeholders,
              "units": units,
              "activities": activities,
              "work_allocation": work_allocation,
              "commits": commits,
              "stats": {
                  "total_sittings": len(sittings),
                  "total_departments": len(departments),
                  "total_units": len(units),
                  "active_units": len([u for u in units if u.get('Lane state') == 'active']),
                  "total_motions": len(improvement_items),
                  "completed_motions": len([i for i in improvement_items if 'complete' in i.get('Status','').lower() or 'closed' in i.get('Cycle stage','').lower()])
              },
              "generated_at": commits[0]['date'] if commits else ""
          }

          with open('dashboard/status.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f"Generated status.json: {len(sittings)} sittings, {len(rulings)} rulings, {len(departments)} departments, {len(units)} units")
