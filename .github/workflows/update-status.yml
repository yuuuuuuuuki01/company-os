name: Generate Status JSON

on:
  push:
    branches: [main]

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: Generate status.json
        run: |
          # 1. Commits history
          git log -30 --pretty=format:'{"hash":"%h","author":"%an","date":"%ci","message":"%s"}' | \
            python3 -c "
          import sys, json, os

          # --- COMMIT PARSING ---
          commits = []
          for line in sys.stdin:
              line = line.strip()
              if line:
                  try: commits.append(json.loads(line))
                  except: pass

          dept_map = {
              'founder': 'founder-office', 'assembly': 'assembly', 'audit': 'audit',
              'engineering': 'engineering', 'pmo': 'pmo', 'security': 'security',
              'people': 'people-talent', 'talent': 'people-talent',
              'data': 'data-knowledge', 'knowledge': 'data-knowledge',
              'research': 'ai-institute', 'ai': 'ai-institute',
              'feat': 'engineering', 'fix': 'engineering', 'docs': 'assembly'
          }

          for c in commits:
              msg = c['message'].lower()
              dept = 'data-knowledge'
              for kw, d in dept_map.items():
                  if kw in msg:
                      dept = d
                      break
              c['dept'] = dept

          # --- TASK PARSING (Improvement Board) ---
          tasks = []
          board_path = 'ledgers/company-os-improvement-board.md'
          if os.path.exists(board_path):
              with open(board_path, 'r', encoding='utf-8') as f:
                  lines = f.readlines()
                  table_started = False
                  for line in lines:
                      if '| Priority |' in line:
                          table_started = True
                          continue
                      if table_started and '| --- |' in line:
                          continue
                      if table_started and line.strip().startswith('|'):
                          parts = [p.strip() for p in line.split('|')]
                          if len(parts) > 7:
                              item = parts[2]
                              status_raw = parts[7].lower()
                              
                              # Status Mapping
                              status = 'pending'
                              if 'closed' in status_raw or 'complete' in status_raw:
                                  status = 'done'
                              elif any(x in status_raw for x in ['active', 'rollout', 'deliberation', 'adopted']):
                                  status = 'active'
                              
                              tasks.append({'label': item, 'status': status})

          # --- STATS CALC ---
          total = len(tasks)
          done = len([t for t in tasks if t['status'] == 'done'])
          active = len([t for t in tasks if t['status'] == 'active'])
          pending = total - done - active

          result = {
              'commits': commits,
              'tasks': {
                  'total': total,
                  'done': done,
                  'active': active,
                  'pending': pending,
                  'items': tasks
              },
              'generated_at': commits[0]['date'] if commits else ''
          }
          print(json.dumps(result, ensure_ascii=False, indent=2))
          " > dashboard/status.json

      - name: Commit status.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/status.json
          git diff --staged --quiet || git commit -m "ci: update status.json [skip ci]"
          git push
